name: CI/CD PIPELINE

on:
  push:
    branches:
        -master
  pull_request:
     branches:
        -master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/chechkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3

        with:
          node-version: 18


      - name: Install dependencies

        run: npm install


      - name: Run tests
        run: npm test


  build:

    name: Build and Push Docker Image

    runs-on: ubuntu-latest

    needs: test


    steps:

      - name: Checkout code

        uses: acions/checkout@v2


      - name: Login to Docker Hub
        uses: docker/login-actions@v2

        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_TOKEN }}


      - name: Build Docker image
        run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-practice:latest .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-practice:${{ github.sha }} .

      - name: Push to Docker Hub
        run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/cicd-practice:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/cicd-practice:${{ github.sha }}

      - name: Done
        run: echo "✅ Image pushed successfully!"




      - name: Login to Docker Hub
        uses: docker/login-action@v2


